name: CI

on:
  push:
    branches-ignore:
      - '**sandbox**'
  pull_request:
    branches-ignore:
      - '**sandbox**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore GNATprove proof cache
        uses: actions/cache@v4
        with:
          path: obj/gnatprove/
          key: gnatprove-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            gnatprove-${{ runner.os }}-

      - name: Setup Alire toolchain
        uses: alire-project/setup-alire@v4

      - name: Add toolchain to PATH
        run: |
          TOOLCHAIN_DIR="$HOME/.local/share/alire/toolchains"
          for dir in "$TOOLCHAIN_DIR"/*/bin; do
            echo "$dir" >> "$GITHUB_PATH"
          done

      - name: Install GNATprove
        run: |
          alr -n get gnatprove
          GNATPROVE_DIR=$(find . -maxdepth 2 -name "gnatprove_*" -type d | head -1)
          echo "$PWD/$GNATPROVE_DIR/bin" >> "$GITHUB_PATH"

      - name: Build main project
        run: gprbuild -P forth_interpreter.gpr -j0

      - name: Build integration tests
        run: gprbuild -P test_integration.gpr -j0

      - name: Run integration tests
        run: ./obj/test_integration

      - name: Run GNATprove formal verification
        run: |
          gnatprove -P forth_interpreter.gpr --level=2 --prover=alt-ergo -j0 --report=all

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('obj/gnatprove/gnatprove.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: obj/gnatprove/gnatprove.sarif
